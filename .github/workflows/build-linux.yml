name: Build Flux (Linux)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Flux Config
      uses: actions/checkout@v4
      with:
        path: flux-config

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 git curl xz-utils bzip2 pkg-config libnss3-dev libcups2-dev libpci-dev libkrb5-dev libatk1.0-dev libatk-bridge2.0-dev libdrm-dev libgl1-mesa-dev libgbm-dev libasound2-dev

    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH

    - name: Fetch Chromium (Shallow clone to save space)
      run: |
        mkdir -p chromium_build
        cd chromium_build
        fetch --no-history chromium
        cd src
        git checkout d1773c3c49faf6bea8dac4dcbba2b751d25b09a1 || true

    - name: Apply Flux Engine Patch
      run: |
        cd chromium_build/src
        git apply --ignore-whitespace --exclude=chrome/app/chromium_strings.grd ../../flux-config/flux_engine_v1.patch

    - name: Configure Flux Build Flags
      run: |
        cd chromium_build/src
        mkdir -p out/Default
        cp ../../flux-config/flux_build_flags.gn out/Default/args.gn
        # Update target_os and target_cpu for Linux
        echo 'target_os = "linux"' >> out/Default/args.gn
        echo 'target_cpu = "x64"' >> out/Default/args.gn
        echo 'chrome_pgo_phase = 0' >> out/Default/args.gn
        gn gen out/Default

    - name: Compile Flux Engine
      run: |
        cd chromium_build/src
        autoninja -C out/Default chrome

    - name: Package Linux Binary
      run: |
        cd chromium_build/src/out/Default
        tar -czvf flux-linux-x64.tar.gz chrome chrome_100_percent.pak chrome_200_percent.pak resources.pak icudtl.dat locales/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flux-Linux-x64
        path: chromium_build/src/out/Default/flux-linux-x64.tar.gz
        retention-days: 7
