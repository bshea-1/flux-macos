name: Build Flux (macOS)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # M1/ARM64 runner with Xcode 15.4 / macOS 14.5 SDK

    steps:
    - name: Checkout Flux Config
      uses: actions/checkout@v4
      with:
        path: flux-config

    - name: Free up disk space (macOS)
      run: |
        sudo rm -rf /Applications/Xcode_14*.app
        sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*
        df -h

    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH

    - name: Fetch Chromium (Shallow clone to save space)
      run: |
        mkdir -p chromium_build
        cd chromium_build
        fetch --no-history chromium
        cd src
        git checkout d1773c3c49faf6bea8dac4dcbba2b751d25b09a1 || true

    - name: Apply Flux Engine Patch
      run: |
        cd chromium_build/src
        git apply --binary --ignore-whitespace --exclude=chrome/app/chromium_strings.grd ../../flux-config/flux_engine_v1.patch

    - name: Fix missing SDK headers (Surgical Patch)
      run: |
        cd chromium_build/src
        python3 - <<EOF
        import os

        def patch_file(path, old, new):
            if not os.path.exists(path):
                print(f"Skipping {path} (not found)")
                return
            with open(path, 'r') as f:
                content = f.read()
            if old in content:
                with open(path, 'w') as f:
                    f.write(content.replace(old, new))
                print(f"Patched {path}")
            else:
                print(f"Already patched or target not found in {path}")

        # Fix mojo fileport.h
        fileport_fix = 'extern "C" int fileport_makeport(int, mach_port_t*); extern "C" int fileport_makefd(mach_port_t);'
        patch_file('mojo/core/ipcz_driver/wrapped_platform_handle.cc', '#include <sys/fileport.h>', fileport_fix)
        patch_file('mojo/core/channel_mac.cc', '#include <sys/fileport.h>', fileport_fix)

        # Fix Crashpad macOS 15 SDK mismatch
        crashpad_path = 'third_party/crashpad/crashpad/util/mach/exc_server_variants.cc'
        if os.path.exists(crashpad_path):
            with open(crashpad_path, 'r') as f:
                lines = f.readlines()
            with open(crashpad_path, 'w') as f:
                skipping = False
                for line in lines:
                    # Skip the protected exception traits and case blocks
                    if 'IdentityProtected' in line and ('using' in line or 'static kern_return_t' in line or 'case MachExcTraits::' in line):
                        f.write(f"// SDK FIX SKIP: {line}")
                        if 'case MachExcTraits::' in line:
                            skipping = True
                    elif skipping and 'return true;' in line:
                        f.write(f"// SDK FIX SKIP: {line}")
                        skipping = False
                    else:
                        f.write(line)
            print(f"Patched {crashpad_path}")
        EOF

    - name: Configure Flux Build Flags
      run: |
        cd chromium_build/src
        mkdir -p out/Default
        # Copy the build flags and ensure target_os is set to mac
        cp ../../flux-config/flux_build_flags.gn out/Default/args.gn
        echo 'target_os="mac"' >> out/Default/args.gn
        echo 'target_cpu="arm64"' >> out/Default/args.gn
        echo 'chrome_pgo_phase = 0' >> out/Default/args.gn
        echo 'mac_sdk_min = "14.0"' >> out/Default/args.gn
        echo 'mac_sdk_path = "/Applications/Xcode_15.4.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX14.5.sdk"' >> out/Default/args.gn
        echo 'use_clang_modules = false' >> out/Default/args.gn
        gn gen out/Default

    - name: Compile Flux Engine
      run: |
        cd chromium_build/src
        autoninja -C out/Default chrome || { cat out/Default/siso_output; exit 1; }

    - name: Package macOS App
      run: |
        cd chromium_build/src
        autoninja -C out/Default mac_installer

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flux-MacOS-ARM64
        path: chromium_build/src/out/Default/*.dmg
        retention-days: 7
