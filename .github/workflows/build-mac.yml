name: Build Flux (macOS)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # M1/ARM64 runner with Xcode 15.4 / macOS 14.5 SDK

    steps:
    - name: Checkout Flux Config
      uses: actions/checkout@v4
      with:
        path: flux-config

    - name: Free up disk space (macOS)
      run: |
        sudo rm -rf /Applications/Xcode_14*.app
        sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*
        df -h

    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH

    - name: Fetch Chromium (Shallow clone to save space)
      run: |
        mkdir -p chromium_build
        cd chromium_build
        fetch --no-history chromium
        cd src
        git checkout d1773c3c49faf6bea8dac4dcbba2b751d25b09a1 || true

    - name: Apply Flux Engine Patch
      run: |
        cd chromium_build/src
        git apply --binary --ignore-whitespace ../../flux-config/flux_engine_v1.patch

    - name: Fix Apple SDK Module Maps
      run: |
        SDK_PATH=$(xcrun --show-sdk-path)
        echo "SDK Path: $SDK_PATH"
        sudo mkdir -p "$SDK_PATH/usr/include"
        
        # DarwinBasic.modulemap
        echo 'module MachO [system] { header "Availability.h" export * }' | sudo tee "$SDK_PATH/usr/include/DarwinBasic.modulemap"
        
        # DarwinFoundation1.modulemap
        echo 'module _DarwinFoundation1 [system] {}' | sudo tee "$SDK_PATH/usr/include/DarwinFoundation1.modulemap"
        echo 'module _AvailabilityInternal [system] {}' | sudo tee -a "$SDK_PATH/usr/include/DarwinFoundation1.modulemap"
        
        # DarwinFoundation2.modulemap
        echo 'module _DarwinFoundation2 [system] {}' | sudo tee "$SDK_PATH/usr/include/DarwinFoundation2.modulemap"
        echo 'module alloca [system] {}' | sudo tee -a "$SDK_PATH/usr/include/DarwinFoundation2.modulemap"
        
        # DarwinFoundation3.modulemap
        echo 'module _DarwinFoundation3 [system] {}' | sudo tee "$SDK_PATH/usr/include/DarwinFoundation3.modulemap"
        echo 'module xlocale [system] {}' | sudo tee -a "$SDK_PATH/usr/include/DarwinFoundation3.modulemap"

    - name: Configure Flux Build Flags
      run: |
        cd chromium_build/src
        mkdir -p out/Default
        # Copy the build flags and ensure target_os is set to mac
        cp ../../flux-config/flux_build_flags.gn out/Default/args.gn
        echo 'target_os="mac"' >> out/Default/args.gn
        echo 'target_cpu="arm64"' >> out/Default/args.gn
        echo 'chrome_pgo_phase = 0' >> out/Default/args.gn
        echo 'mac_sdk_min = "14.0"' >> out/Default/args.gn
        gn gen out/Default

    - name: Compile Flux Engine
      run: |
        cd chromium_build/src
        autoninja -C out/Default chrome || { cat out/Default/siso_output; exit 1; }

    - name: Package macOS App
      run: |
        cd chromium_build/src
        autoninja -C out/Default mac_installer

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flux-MacOS-ARM64
        path: chromium_build/src/out/Default/*.dmg
        retention-days: 7
