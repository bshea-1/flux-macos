name: Build Flux (macOS)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Flux Config
      uses: actions/checkout@v4
      with:
        path: flux-config

    - name: Select Xcode and verify SDK
      run: |
        sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
        xcode-select -p
        xcrun --show-sdk-path
        xcrun --show-sdk-version

    - name: Free up disk space
      run: |
        sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*
        df -h

    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH

    - name: Fetch Chromium (Shallow clone to save space)
      run: |
        mkdir -p chromium_build
        cd chromium_build
        fetch --no-history chromium
        cd src
        git checkout d1773c3c49faf6bea8dac4dcbba2b751d25b09a1 || true

    - name: Apply Flux Engine Patch
      run: |
        cd chromium_build/src
        git apply --binary --ignore-whitespace --exclude=chrome/app/chromium_strings.grd ../../flux-config/flux_engine_v1.patch

    - name: Fix SDK compatibility issues
      run: |
        cd chromium_build/src
        # 1) sys/fileport.h is a private Apple header not in any public SDK.
        sed -i '' 's|#include <sys/fileport.h>|extern "C" int fileport_makeport(int, mach_port_t*); extern "C" int fileport_makefd(mach_port_t);|' \
          mojo/core/ipcz_driver/wrapped_platform_handle.cc \
          mojo/core/channel_mac.cc
        # 2) kCGImageByteOrder32Host was removed in macOS 15 SDK.
        #    On ARM64 (little-endian) it equals kCGImageByteOrder32Little.
        grep -rl 'kCGImageByteOrder32Host' --include='*.mm' --include='*.cc' --include='*.h' --include='*.m' . | \
          xargs sed -i '' 's/kCGImageByteOrder32Host/kCGImageByteOrder32Little/g' || true
        # 3) NSScreen.CGDirectDisplayID does not exist in macOS 15 SDK.
        sed -i '' 's|if (@available(macOS 26, \*)) {|if (false) {|' ui/display/mac/screen_utils_mac.mm

    - name: Configure Flux Build Flags
      run: |
        cd chromium_build/src
        mkdir -p out/Default
        cp ../../flux-config/flux_build_flags.gn out/Default/args.gn
        echo 'target_os="mac"' >> out/Default/args.gn
        echo 'target_cpu="arm64"' >> out/Default/args.gn
        echo 'chrome_pgo_phase = 0' >> out/Default/args.gn
        echo 'use_clang_modules = false' >> out/Default/args.gn
        gn gen out/Default

    - name: Compile Flux Engine
      run: |
        cd chromium_build/src
        autoninja -C out/Default chrome || { cat out/Default/siso_output; exit 1; }

    - name: Package macOS App
      run: |
        cd chromium_build/src
        autoninja -C out/Default mac_installer

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flux-MacOS-ARM64
        path: chromium_build/src/out/Default/*.dmg
        retention-days: 7
