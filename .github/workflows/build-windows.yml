name: Build Flux (Windows)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Flux Config
      uses: actions/checkout@v4
      with:
        path: flux-config

    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo %GITHUB_WORKSPACE%\depot_tools>> %GITHUB_PATH%
      shell: cmd

    - name: Fetch Chromium (Shallow clone to save space)
      run: |
        mkdir chromium_build
        cd chromium_build
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        fetch --no-history chromium
        cd src
        git checkout d1773c3c49faf6bea8dac4dcbba2b751d25b09a1 || cd .
      shell: cmd

    - name: Apply Flux Engine Patch
      run: |
        cd chromium_build\src
        git apply --binary --ignore-whitespace ../../flux-config/flux_engine_v1.patch
      shell: cmd

    - name: Configure Flux Build Flags
      run: |
        cd chromium_build\src
        mkdir out\Default
        copy ..\..\flux-config\flux_build_flags.gn out\Default\args.gn
        echo target_os = "win">> out\Default\args.gn
        echo target_cpu = "x64">> out\Default\args.gn
        echo chrome_pgo_phase = 0>> out\Default\args.gn
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        gn gen out\Default
      shell: cmd

    - name: Compile Flux Engine
      run: |
        cd chromium_build\src
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        autoninja -C out\Default chrome
      shell: cmd

    - name: Package Windows Installer
      run: |
        cd chromium_build\src
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        autoninja -C out\Default mini_installer
      shell: cmd

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flux-Windows-x64
        path: chromium_build\src\out\Default\mini_installer.exe
        retention-days: 7
